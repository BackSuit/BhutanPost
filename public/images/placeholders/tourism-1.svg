  <rect x="410" y="157" width="10" height="13" fill="rgba(0,0,0,0.5)" rx="1"/>
  <rect x="386" y="185" width="10" height="13" fill="rgba(0,0,0,0.5)" rx="1"/>
  <rect x="404"  y="185" width="10" height="13" fill="rgba(0,0,0,0.5)" rx="1"/>
