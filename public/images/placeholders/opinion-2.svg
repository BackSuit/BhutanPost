<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">

  <defs>
    <linearGradient id="gopinion2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1565C0"/>
      <stop offset="55%"  stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#B8D9F0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#gopinion2)"/>

  <ellipse cx="160" cy="95"  rx="80" ry="22" fill="white" opacity="0.14"/>
