<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">

  <defs>
    <linearGradient id="glifestyle2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1565C0"/>
      <stop offset="55%"  stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#B8D9F0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#glifestyle2)"/>

  <ellipse cx="160" cy="95"  rx="80" ry="22" fill="white" opacity="0.14"/>
  <ellipse cx="200" cy="85"  rx="55" ry="18" fill="white" opacity="0.14"/>
  <ellipse cx="580" cy="110" rx="90" ry="24" fill="white" opacity="0.14"/>
  <ellipse cx="630" cy="100" rx="60" ry="18" fill="white" opacity="0.14"/>

  <!-- Far snow-capped peaks -->
  <polygon points="0,330 70,210 130,260 200,180 270,230 350,160 430,200 510,155 590,195 670,175 740,210 800,190 800,380 0,380"
           fill="#8DAFC8" opacity="0.75"/>
  <!-- Snow caps -->
  <polygon points="200,180 215,215 185,215" fill="white" opacity="0.55"/>
  <polygon points="350,160 368,200 332,200" fill="white" opacity="0.6"/>
  <polygon points="510,155 528,193 492,193" fill="white" opacity="0.6"/>
  <polygon points="670,175 685,210 655,210" fill="white" opacity="0.5"/>
  <!-- Mid range -->
  <polygon points="0,390 60,320 130,360 210,295 290,340 380,280 460,325 550,268 640,308 720,282 800,315 800,500 0,500"
           fill="#3A7A3A"/>
  <!-- Foreground hills -->
  <polygon points="0,455 140,415 300,445 460,408 620,438 780,412 800,420 800,500 0,500"
           fill="#2A5A2A"/>

  <!-- Foundation -->
  <rect x="305" y="362" width="190" height="10" fill="#784212" opacity="0.4" rx="1"/>
  <!-- Ground floor — wider, dark base typical of Bhutanese homes -->
  <rect x="315" y="305" width="170" height="58" fill="#784212" rx="2"/>
  <!-- Upper floor — slightly narrower, lighter tone -->
  <rect x="325" y="250" width="150" height="58" fill="#F9E4B7" rx="2"/>
  <!-- Red painted stripe band (traditional) -->
  <rect x="325" y="268" width="150" height="11" fill="#8B1A1A" opacity="0.4"/>
  <!-- Roof — Bhutanese hipped style -->
  <polygon points="320,250 400,210 480,250" fill="#784212"/>
  <!-- Roof overhang highlights -->
  <line x1="318" y1="250" x2="482" y2="250"
        stroke="#F9E4B7" stroke-width="3" opacity="0.5"/>
  <!-- Chimney -->
  <rect x="440" y="200" width="14" height="30" fill="#784212" rx="1"/>
  <!-- Upper windows (traditional small square) -->
  <rect x="345" y="262" width="20" height="18" fill="rgba(0,0,0,0.4)" rx="2"/>
  <rect x="390" y="262" width="20" height="18" fill="rgba(0,0,0,0.4)" rx="2"/>
  <rect x="435" y="262" width="20" height="18" fill="rgba(0,0,0,0.4)" rx="2"/>
  <!-- Lower windows -->
  <rect x="340" y="317"  width="22" height="22" fill="rgba(0,0,0,0.4)" rx="2"/>
  <rect x="438" y="317"  width="22" height="22" fill="rgba(0,0,0,0.4)" rx="2"/>
  <!-- Door (arched) -->
  <path d="M 386,362 L 386,328
             Q 400,316 414,328 L 414,362 Z"
        fill="rgba(0,0,0,0.5)"/>
  <!-- Decorative window trim (small lines above windows) -->
  <line x1="343" y1="260" x2="363" y2="260"
        stroke="#F9E4B7" stroke-width="2" opacity="0.6"/>
  <line x1="388" y1="260" x2="412" y2="260"
        stroke="#F9E4B7" stroke-width="2" opacity="0.6"/>
  <line x1="433" y1="260" x2="457" y2="260"
        stroke="#F9E4B7" stroke-width="2" opacity="0.6"/>
<line x1="180" y1="180" x2="310" y2="210"
       stroke="#8B6914" stroke-width="1.5" opacity="0.7"/><rect x="171.0" y="180.0"
         width="18" height="24" fill="#1565C0" opacity="0.88" rx="1"/><rect x="203.5" y="187.5"
         width="18" height="24" fill="#FFFFFF" opacity="0.88" rx="1"/><rect x="236.0" y="195.0"
         width="18" height="24" fill="#C0392B" opacity="0.88" rx="1"/><rect x="268.5" y="202.5"
         width="18" height="24" fill="#2E7D32" opacity="0.88" rx="1"/><rect x="301.0" y="210.0"
         width="18" height="24" fill="#F4D03F" opacity="0.88" rx="1"/>

  <rect x="0" y="0" width="800" height="500" fill="none"
        stroke="rgba(255,255,255,0.18)" stroke-width="10"/>
</svg>