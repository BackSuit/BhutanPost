<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">

  <defs>
    <linearGradient id="gworld1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C0642A"/>
      <stop offset="55%"  stop-color="#F4A460"/>
      <stop offset="100%" stop-color="#FFD4A3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#gworld1)"/>

  <ellipse cx="160" cy="95"  rx="80" ry="22" fill="white" opacity="0.18"/>
  <ellipse cx="200" cy="85"  rx="55" ry="18" fill="white" opacity="0.18"/>
  <ellipse cx="580" cy="110" rx="90" ry="24" fill="white" opacity="0.18"/>
  <ellipse cx="630" cy="100" rx="60" ry="18" fill="white" opacity="0.18"/>

  <!-- Far snow-capped peaks -->
  <polygon points="0,330 70,210 130,260 200,180 270,230 350,160 430,200 510,155 590,195 670,175 740,210 800,190 800,380 0,380"
           fill="#C49070" opacity="0.75"/>
  <!-- Snow caps -->
  <polygon points="200,180 215,215 185,215" fill="white" opacity="0.55"/>
  <polygon points="350,160 368,200 332,200" fill="white" opacity="0.6"/>
  <polygon points="510,155 528,193 492,193" fill="white" opacity="0.6"/>
  <polygon points="670,175 685,210 655,210" fill="white" opacity="0.5"/>
  <!-- Mid range -->
  <polygon points="0,390 60,320 130,360 210,295 290,340 380,280 460,325 550,268 640,308 720,282 800,315 800,500 0,500"
           fill="#7A5040"/>
  <!-- Foreground hills -->
  <polygon points="0,455 140,415 300,445 460,408 620,438 780,412 800,420 800,500 0,500"
           fill="#4A3028"/>

  <circle cx="400" cy="210" r="70" fill="#AED6F1" opacity="0.1"/>
  <circle cx="400" cy="210" r="70" fill="none" stroke="#2471A3" stroke-width="2" opacity="0.4"/>
  <circle cx="400" cy="210" r="58"       fill="none" stroke="#2471A3" stroke-width="1.5" opacity="0.3"/>
  <!-- 4 main cardinal points -->
  <polygon points="400.0,152.0 407.2,187.9 400.0,222.0 392.8,187.9" fill="#2471A3"/>
  <polygon points="400.0,268.0 392.8,232.1 400.0,198.0 407.2,232.1" fill="#AED6F1" opacity="0.75"/>
  <polygon points="458.0,210.0 422.1,217.2 388.0,210.0 422.1,202.8" fill="#AED6F1" opacity="0.75"/>
  <polygon points="342.0,210.0 377.9,202.8 412.0,210.0 377.9,217.2" fill="#AED6F1" opacity="0.75"/>
  <!-- 4 ordinal points -->
  <polygon points="428.7,181.3 418.1,200.8 391.5,218.5 409.2,191.9" fill="#AED6F1" opacity="0.55"/>
  <polygon points="428.7,238.7 409.2,228.1 391.5,201.5 418.1,219.2" fill="#AED6F1" opacity="0.55"/>
  <polygon points="371.3,238.7 381.9,219.2 408.5,201.5 390.8,228.1" fill="#AED6F1" opacity="0.55"/>
  <polygon points="371.3,181.3 390.8,191.9 408.5,218.5 381.9,200.8" fill="#AED6F1" opacity="0.55"/>
  <!-- Center -->
  <circle cx="400" cy="210" r="9" fill="#2471A3"/>
  <circle cx="400" cy="210" r="4" fill="#AED6F1"/>


  <rect x="0" y="0" width="800" height="500" fill="none"
        stroke="rgba(255,255,255,0.18)" stroke-width="10"/>
