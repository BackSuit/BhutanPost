<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">

  <defs>
    <linearGradient id="gpolitics2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1565C0"/>
      <stop offset="55%"  stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#B8D9F0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#gpolitics2)"/>

  <ellipse cx="160" cy="95"  rx="80" ry="22" fill="white" opacity="0.14"/>
  <ellipse cx="200" cy="85"  rx="55" ry="18" fill="white" opacity="0.14"/>
  <ellipse cx="580" cy="110" rx="90" ry="24" fill="white" opacity="0.14"/>
  <ellipse cx="630" cy="100" rx="60" ry="18" fill="white" opacity="0.14"/>

  <!-- Far snow-capped peaks -->
  <polygon points="0,330 70,210 130,260 200,180 270,230 350,160 430,200 510,155 590,195 670,175 740,210 800,190 800,380 0,380"
           fill="#8DAFC8" opacity="0.75"/>
  <!-- Snow caps -->
  <polygon points="200,180 215,215 185,215" fill="white" opacity="0.55"/>
  <polygon points="350,160 368,200 332,200" fill="white" opacity="0.6"/>
  <polygon points="510,155 528,193 492,193" fill="white" opacity="0.6"/>
  <polygon points="670,175 685,210 655,210" fill="white" opacity="0.5"/>
  <!-- Mid range -->
  <polygon points="0,390 60,320 130,360 210,295 290,340 380,280 460,325 550,268 640,308 720,282 800,315 800,500 0,500"
           fill="#3A7A3A"/>
  <!-- Foreground hills -->
  <polygon points="0,455 140,415 300,445 460,408 620,438 780,412 800,420 800,500 0,500"
           fill="#2A5A2A"/>

  <!-- Main dzong base -->
  <rect x="315" y="280" width="170" height="75" fill="#C0392B" rx="3"/>
  <!-- Mid floor -->
  <rect x="330" y="238" width="140" height="46" fill="#FDECEA" rx="2"/>
  <!-- Red stripe (traditional dzong band) -->
  <rect x="330" y="255" width="140" height="10" fill="#8B1A1A" opacity="0.5"/>
  <!-- Central tower -->
  <rect x="378" y="190" width="44" height="55" fill="#C0392B" rx="2"/>
  <rect x="382" y="195" width="36" height="10" fill="#8B1A1A" opacity="0.4"/>
  <!-- Central tower roof -->
  <polygon points="400,168 374,190 426,190" fill="#FDECEA"/>
  <line x1="374" y1="190" x2="426" y2="190"
        stroke="#8B1A1A" stroke-width="2" opacity="0.5"/>
  <!-- Left wing tower -->
  <rect x="320" y="215" width="26" height="67" fill="#FDECEA" rx="2"/>
  <polygon points="333,198 316,215 350,215" fill="#C0392B"/>
  <!-- Right wing tower -->
  <rect x="454" y="215" width="26" height="67" fill="#FDECEA" rx="2"/>
  <polygon points="467,198 450,215 484,215" fill="#C0392B"/>
  <!-- Windows row -->
  <rect x="345" y="252" width="16" height="20" fill="rgba(0,0,0,0.45)" rx="2"/>
  <rect x="392"  y="252" width="16" height="20" fill="rgba(0,0,0,0.45)" rx="2"/>
  <rect x="439" y="252" width="16" height="20" fill="rgba(0,0,0,0.45)" rx="2"/>
  <!-- Gate arch -->
  <path d="M 386,355 L 386,320 Q 400,305 414,320 L 414,355 Z"
        fill="rgba(0,0,0,0.5)"/>
  <!-- Foundation steps -->
  <rect x="310" y="353" width="180" height="8"  fill="#C0392B" opacity="0.5" rx="1"/>
  <rect x="305" y="360" width="190" height="6"  fill="#FDECEA" opacity="0.35" rx="1"/>
<line x1="480" y1="230" x2="660" y2="270"
       stroke="#8B6914" stroke-width="1.5" opacity="0.7"/><rect x="471.0" y="230.0"
         width="18" height="24" fill="#1565C0" opacity="0.88" rx="1"/><rect x="501.0" y="236.7"
         width="18" height="24" fill="#FFFFFF" opacity="0.88" rx="1"/><rect x="531.0" y="243.3"
         width="18" height="24" fill="#C0392B" opacity="0.88" rx="1"/><rect x="561.0" y="250.0"
         width="18" height="24" fill="#2E7D32" opacity="0.88" rx="1"/><rect x="591.0" y="256.7"
         width="18" height="24" fill="#F4D03F" opacity="0.88" rx="1"/><rect x="621.0" y="263.3"
         width="18" height="24" fill="#1565C0" opacity="0.88" rx="1"/><rect x="651.0" y="270.0"
         width="18" height="24" fill="#FFFFFF" opacity="0.88" rx="1"/>

  <rect x="0" y="0" width="800" height="500" fill="none"
        stroke="rgba(255,255,255,0.18)" stroke-width="10"/>
